# Install with:
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/chainer-agent
#
# logrotate runs from /etc/cron.daily/logrotate by default. We use
# `copytruncate` so the gunicorn / node processes keep writing to the
# same FD without needing a service restart.
/home/m/chainer-agent/trainer.log
/home/m/chainer-agent/bots.log
/home/m/chainer-agent/dashboard.log
/home/m/chainer-agent/doctor.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 100M
}
